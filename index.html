<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: #333;
            border: 3px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .game-area {
            position: relative;
            width: 100%;
            height: 100%;
            background: #222;
            overflow: hidden;
        }

        .road {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                transparent 0%, 
                transparent 48%, 
                #ffff00 49%, 
                #ffff00 51%, 
                transparent 52%, 
                transparent 100%
            );
            background-size: 100% 50px;
            animation: roadMove 0.5s linear infinite;
        }

        @keyframes roadMove {
            0% { transform: translateY(-50px); }
            100% { transform: translateY(0); }
        }

        .player-car {
            position: absolute;
            width: 40px;
            height: 70px;
            background: #ff4444;
            border-radius: 10px 10px 5px 5px;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
            transition: left 0.1s ease;
        }

        .player-car::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 15px;
            background: #87ceeb;
            top: 10px;
            left: 5px;
            border-radius: 3px;
        }

        .player-car::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            bottom: 5px;
            left: 5px;
            box-shadow: 20px 0 #333, 0 -50px #333, 20px -50px #333;
        }

        .enemy-car {
            position: absolute;
            width: 40px;
            height: 70px;
            background: #4444ff;
            border-radius: 5px 5px 10px 10px;
            box-shadow: 0 0 10px rgba(68, 68, 255, 0.5);
        }

        .enemy-car::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 15px;
            background: #87ceeb;
            bottom: 10px;
            left: 5px;
            border-radius: 3px;
        }

        .enemy-car::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            top: 5px;
            left: 5px;
            box-shadow: 20px 0 #333, 0 50px #333, 20px 50px #333;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            display: none;
        }

        .game-over h2 {
            color: #ff4444;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .game-over p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .restart-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .restart-btn:hover {
            background: #45a049;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            font-size: 14px;
            z-index: 100;
        }

        .speed-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 16px;
            z-index: 100;
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
        }

        .start-screen h1 {
            color: #ffff00;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .start-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        .start-btn:hover {
            background: #ff6666;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-area" id="gameArea">
            <div class="road"></div>
            
            <div class="ui">
                <div>Score: <span id="score">0</span></div>
                <div>Level: <span id="level">1</span></div>
            </div>
            
            <div class="speed-indicator">
                Speed: <span id="speed">60</span> mph
            </div>
            
            <div class="player-car" id="playerCar"></div>
            
            <div class="controls">
                Use ← → Arrow Keys or A/D to steer
            </div>
        </div>
        
        <div class="start-screen" id="startScreen">
            <h1>🏁 RACING GAME</h1>
            <p>Avoid the enemy cars and survive as long as possible!</p>
            <p>Use arrow keys or A/D to steer</p>
            <button class="start-btn" onclick="startGame()">START GAME</button>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>💥 GAME OVER!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Level Reached: <span id="finalLevel">1</span></p>
            <button class="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        class RacingGame {
            constructor() {
                this.gameArea = document.getElementById('gameArea');
                this.playerCar = document.getElementById('playerCar');
                this.scoreElement = document.getElementById('score');
                this.levelElement = document.getElementById('level');
                this.speedElement = document.getElementById('speed');
                
                this.playerPosition = 50; // Percentage from left
                this.score = 0;
                this.level = 1;
                this.speed = 60;
                this.gameRunning = false;
                this.enemyCars = [];
                this.gameLoop = null;
                
                this.keys = {
                    left: false,
                    right: false
                };
                
                this.setupEventListeners();
            }
            
            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    switch(e.key) {
                        case 'ArrowLeft':
                        case 'a':
                        case 'A':
                            this.keys.left = true;
                            break;
                        case 'ArrowRight':
                        case 'd':
                        case 'D':
                            this.keys.right = true;
                            break;
                    }
                });
                
                document.addEventListener('keyup', (e) => {
                    switch(e.key) {
                        case 'ArrowLeft':
                        case 'a':
                        case 'A':
                            this.keys.left = false;
                            break;
                        case 'ArrowRight':
                        case 'd':
                        case 'D':
                            this.keys.right = false;
                            break;
                    }
                });
            }
            
            start() {
                this.gameRunning = true;
                this.score = 0;
                this.level = 1;
                this.speed = 60;
                this.playerPosition = 50;
                this.enemyCars = [];
                
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameOver').style.display = 'none';
                
                this.updateUI();
                this.gameLoop = setInterval(() => this.update(), 50);
                
                // Spawn enemy cars
                this.spawnEnemies();
            }
            
            spawnEnemies() {
                if (!this.gameRunning) return;
                
                const enemyCar = document.createElement('div');
                enemyCar.className = 'enemy-car';
                enemyCar.style.left = Math.random() * 80 + 10 + '%';
                enemyCar.style.top = '-70px';
                
                this.gameArea.appendChild(enemyCar);
                this.enemyCars.push({
                    element: enemyCar,
                    y: -70
                });
                
                // Spawn next enemy car
                const spawnDelay = Math.max(800 - this.level * 50, 300);
                setTimeout(() => this.spawnEnemies(), spawnDelay);
            }
            
            update() {
                if (!this.gameRunning) return;
                
                // Move player
                if (this.keys.left && this.playerPosition > 5) {
                    this.playerPosition -= 3;
                }
                if (this.keys.right && this.playerPosition < 85) {
                    this.playerPosition += 3;
                }
                
                this.playerCar.style.left = this.playerPosition + '%';
                
                // Move enemy cars
                const carSpeed = 4 + this.level;
                for (let i = this.enemyCars.length - 1; i >= 0; i--) {
                    const car = this.enemyCars[i];
                    car.y += carSpeed;
                    car.element.style.top = car.y + 'px';
                    
                    // Remove cars that are off screen
                    if (car.y > 600) {
                        car.element.remove();
                        this.enemyCars.splice(i, 1);
                        this.score += 10;
                        
                        // Level up every 100 points
                        if (this.score % 100 === 0) {
                            this.level++;
                            this.speed += 10;
                        }
                        
                        this.updateUI();
                    }
                    
                    // Check collision
                    if (this.checkCollision(car)) {
                        this.gameOver();
                        return;
                    }
                }
            }
            
            checkCollision(enemyCar) {
                const playerRect = this.playerCar.getBoundingClientRect();
                const enemyRect = enemyCar.element.getBoundingClientRect();
                
                return !(playerRect.right < enemyRect.left || 
                        playerRect.left > enemyRect.right || 
                        playerRect.bottom < enemyRect.top || 
                        playerRect.top > enemyRect.bottom);
            }
            
            updateUI() {
                this.scoreElement.textContent = this.score;
                this.levelElement.textContent = this.level;
                this.speedElement.textContent = this.speed;
            }
            
            gameOver() {
                this.gameRunning = false;
                clearInterval(this.gameLoop);
                
                // Clean up enemy cars
                this.enemyCars.forEach(car => car.element.remove());
                this.enemyCars = [];
                
                // Show game over screen
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalLevel').textContent = this.level;
                document.getElementById('gameOver').style.display = 'block';
            }
        }
        
        let game = new RacingGame();
        
        function startGame() {
            game.start();
        }
        
        function restartGame() {
            game = new RacingGame();
            game.start();
        }
    </script>
</body>
</html>
